---
# See https://github.com/ansible/team-devtools/blob/main/.github/workflows/push.yml
name: push
on:
  push:
    branches:
      - main
      - "releases/**"
      - "stable/**"
  workflow_dispatch:

# Caller must grant at least the permissions required by team-devtools push.yml.
permissions:
  contents: write # release-drafter updates the draft release notes
  pull-requests: read

jobs:
  ack:
    uses: ansible/team-devtools/.github/workflows/push.yml@main
